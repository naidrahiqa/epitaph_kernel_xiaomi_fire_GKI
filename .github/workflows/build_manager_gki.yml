name: "🎛️ GKI Control Center"

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release Tag"
        required: true
        default: "v1.0"

permissions:
  actions: write
  contents: write

jobs:
  prepare:
    name: "📋 Prepare Build Matrix"
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      total: ${{ steps.matrix.outputs.total }}
    steps:
      - name: Validate release_tag
        shell: bash
        run: |
          TAG="${{ inputs.release_tag }}"
          if [[ ! "$TAG" =~ ^v[0-9] ]]; then
            echo "❌ ERROR: release_tag must start with 'v' followed by a number (e.g., v1.0, v2.3-beta)"
            exit 1
          fi
          if [[ "$TAG" =~ [[:space:]] ]]; then
            echo "❌ ERROR: release_tag must not contain spaces!"
            exit 1
          fi
          echo "✅ release_tag validated: $TAG"
      - name: "📊 Show Build Plan"
        run: |
          echo "## 🎛️ Epitaph Kernel Build" >> "$GITHUB_STEP_SUMMARY"
          echo "**Release Tag:** \`${{ inputs.release_tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Configuration:** SUSFS + ZyClang (single build)" >> "$GITHUB_STEP_SUMMARY"

  notify_start:
    name: "🚀 Notify Telegram (Starting)"
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Send Start Message to Telegram
        env:
          TG_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TG_BOT_TOKEN" ] || [ -z "$TG_CHAT_ID" ]; then
            echo "❌ Telegram secrets not set. Skipping."
            exit 0
          fi

          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
          MESSAGE=$(printf '<b>🚀 Epitaph Kernel — Build Starting</b>\n\n<b>Developer:</b> Naidrahiqa\n<b>Release Tag:</b> %s\n<b>Configuration:</b> SUSFS + ZyClang\n<b>Triggered by:</b> %s\n\n<a href="%s">🔍 Monitor Build Progress on GitHub Actions</a>' \
            "${{ inputs.release_tag }}" "${{ github.actor }}" "$RUN_URL")
          
          echo "Sending to Chat ID: ${TG_CHAT_ID}"
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}\n" -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            --form-string "chat_id=${TG_CHAT_ID}" \
            --form-string "text=${MESSAGE}" \
            --form-string "parse_mode=HTML")
          
          echo "=== Telegram Response ==="
          echo "$RESPONSE"
          echo "========================="
          
          if echo "$RESPONSE" | grep -q "HTTP_STATUS:200"; then
            echo "✅ Message sent successfully!"
          else
            echo "❌ Failed to send message!"
            exit 1
          fi

  trigger:
    needs: [prepare, notify_start]
    uses: ./.github/workflows/_build_kernel_core.yml
    secrets: inherit
    with:
      with_susfs: 'true'
      custom_name: "Epitaph"
      author_name: "Naidrahiqa"
      ksu_method: "kernelsu-next"
      clang_toolchain: "zyc-latest"
      release_tag: "${{ inputs.release_tag }}"

  summary:
    name: "📊 Summary & Notify"
    needs: [prepare, trigger]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Write Summary
        run: |
          echo "## 🎛️ Epitaph Kernel — Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Setting | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Release Tag** | \`${{ inputs.release_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Configuration** | \`SUSFS + ZyClang\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          
          RESULT="${{ needs.trigger.result }}"
          if [ "$RESULT" = "success" ]; then
            echo "✅ Build completed successfully." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ Build failed or was cancelled." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Send Finished Message to Telegram
        continue-on-error: true
        env:
          TG_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TG_ERROR_CHAT_ID: ${{ secrets.TELEGRAM_ERROR_CHAT_ID }}
        run: |
          [ -z "$TG_BOT_TOKEN" ] && exit 0

          RESULT="${{ needs.trigger.result }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/${{ inputs.release_tag }}"

          if [ "$RESULT" = "success" ]; then
            # Sukses → kirim ke channel update
            [ -z "$TG_CHAT_ID" ] && exit 0
            MESSAGE=$(printf '<b>👑 Epitaph Kernel — Build Finished Successfully</b>\n\n<b>Developer:</b> Naidrahiqa\n<b>Release Tag:</b> %s\n<b>Configuration:</b> SUSFS + ZyClang\n<b>Status:</b> ✅ SUCCESS\n\n📦 <a href="%s">GitHub Release</a>\n🔍 <a href="%s">Actions Run Log</a>' \
              "${{ inputs.release_tag }}" "$RELEASE_URL" "$RUN_URL")
            curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
              --form-string "chat_id=${TG_CHAT_ID}" --form-string "text=${MESSAGE}" --form-string "parse_mode=HTML"
          else
            # Gagal → kirim ke channel error dump
            [ -z "$TG_ERROR_CHAT_ID" ] && exit 0
            MESSAGE=$(printf '<b>❌ Epitaph Kernel — Build Failed</b>\n\n<b>Developer:</b> Naidrahiqa\n<b>Release Tag:</b> %s\n<b>Configuration:</b> SUSFS + ZyClang\n<b>Status:</b> ❌ FAILED\n\n🔍 <a href="%s">Actions Run Log</a>' \
              "${{ inputs.release_tag }}" "$RUN_URL")
            curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
              --form-string "chat_id=${TG_ERROR_CHAT_ID}" --form-string "text=${MESSAGE}" --form-string "parse_mode=HTML"
          fi
