name: "🎛️ GKI Control Center"

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release Tag"
        required: true
        default: "v1.0"
      clang_toolchain:
        description: "Clang Toolchain"
        required: true
        type: choice
        options:
          - zyc-latest
          - cyrene-clang
        default: "zyc-latest"

permissions:
  actions: write
  contents: write

jobs:
  prepare:
    name: "📋 Prepare Build Matrix"
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      total: ${{ steps.matrix.outputs.total }}
      release_tag: ${{ steps.tag.outputs.release_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release_tag
        id: tag
        shell: bash
        env:
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          if [ -n "$INPUT_RELEASE_TAG" ]; then
            TAG="$INPUT_RELEASE_TAG"
          else
            # Auto-generate from commit count for push triggers
            TAG="v$(git rev-list --count HEAD)"
          fi
          if [[ ! "$TAG" =~ ^v[0-9] ]]; then
            echo "❌ ERROR: release_tag must start with 'v' followed by a number"
            exit 1
          fi
          echo "release_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "✅ release_tag: $TAG"

      - name: Setup Matrix
        id: matrix
        shell: bash
        env:
          INPUT_CLANG: ${{ github.event.inputs.clang_toolchain }}
        run: |
          if [ -n "$INPUT_CLANG" ]; then
            MATRIX_JSON="[\"$INPUT_CLANG\"]"
          else
            MATRIX_JSON='["zyc-latest", "cyrene-clang"]'
          fi
          echo "matrix=$MATRIX_JSON" >> "$GITHUB_OUTPUT"
          echo "total=$(echo $MATRIX_JSON | jq '. | length')" >> "$GITHUB_OUTPUT"
          echo "✅ Matrix configured: $MATRIX_JSON"

      - name: "📊 Show Build Plan"
        env:
          MATRIX_JSON: ${{ steps.matrix.outputs.matrix }}
        run: |
          TC_DISPLAY=""
          if echo "$MATRIX_JSON" | grep -q "zyc-latest"; then
            TC_DISPLAY="ZyClang"
          fi
          if echo "$MATRIX_JSON" | grep -q "cyrene-clang"; then
            if [ -n "$TC_DISPLAY" ]; then
              TC_DISPLAY="$TC_DISPLAY + Cyrene Clang"
            else
              TC_DISPLAY="Cyrene Clang"
            fi
          fi
          echo "## 🎛️ Epitaph Kernel Build" >> "$GITHUB_STEP_SUMMARY"
          echo "**Release Tag:** \`${{ steps.tag.outputs.release_tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Configuration:** xxKSU + $TC_DISPLAY (matrix build)" >> "$GITHUB_STEP_SUMMARY"

  notify_start:
    name: "🚀 Notify Telegram (Starting)"
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Send Start Message to Telegram
        continue-on-error: true
        env:
          TG_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          ACTOR: ${{ github.actor }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
          MATRIX_JSON: ${{ needs.prepare.outputs.matrix }}
        run: |
          if [ -z "$TG_BOT_TOKEN" ] || [ -z "$TG_CHAT_ID" ]; then
            echo "❌ Telegram secrets not set. Skipping."
            exit 0
          fi

          RUN_URL="https://github.com/${REPO}/actions/runs/${RUN_ID}"
          
          TC_DISPLAY=""
          if echo "$MATRIX_JSON" | grep -q "zyc-latest"; then
            TC_DISPLAY="ZyClang"
          fi
          if echo "$MATRIX_JSON" | grep -q "cyrene-clang"; then
            if [ -n "$TC_DISPLAY" ]; then
              TC_DISPLAY="$TC_DISPLAY + Cyrene Clang"
            else
              TC_DISPLAY="Cyrene Clang"
            fi
          fi

          MESSAGE=$(printf '🔥 <b>EPITAPH KERNEL · Build Starting</b>\n────────────────\n🚀 <b>Build:</b> %s\n📱 <b>Device:</b> Redmi 12 (fire) · G88\n🛠️ <b>Compiler:</b> %s\n⚡ <b>Feature:</b> xxKSU [No-SUSFS]\n👤 <b>Actor:</b> %s\n────────────────\n🔍 <a href="%s">Monitor Build Progress on GitHub Actions</a>' \
            "$RELEASE_TAG" "$TC_DISPLAY" "$ACTOR" "$RUN_URL")
          
          echo "Sending to Chat ID: ${TG_CHAT_ID}"
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}\n" -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            --form-string "chat_id=${TG_CHAT_ID}" \
            --form-string "text=${MESSAGE}" \
            --form-string "parse_mode=HTML")
          
          echo "=== Telegram Response ==="
          echo "$RESPONSE"
          echo "========================="
          
          if echo "$RESPONSE" | grep -q "HTTP_STATUS:200"; then
            echo "✅ Message sent successfully!"
          else
            echo "❌ Failed to send message!"
            exit 1
          fi

  trigger:
    needs: [prepare, notify_start]
    strategy:
      matrix:
        clang: ${{ fromJSON(needs.prepare.outputs.matrix) }}
      fail-fast: false
    uses: ./.github/workflows/_build_kernel_core.yml
    secrets: inherit
    with:
      with_susfs: 'false'
      custom_name: "Epitaph"
      author_name: "Naidrahiqa"
      ksu_method: "xxksu"
      clang_toolchain: "${{ matrix.clang }}"
      release_tag: "${{ needs.prepare.outputs.release_tag }}"

  summary:
    name: "📊 Summary & Notify"
    needs: [prepare, trigger]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Write Summary
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          TRIGGER_RESULT: ${{ needs.trigger.result }}
          MATRIX_JSON: ${{ needs.prepare.outputs.matrix }}
        run: |
          TC_DISPLAY=""
          if echo "$MATRIX_JSON" | grep -q "zyc-latest"; then
            TC_DISPLAY="ZyClang"
          fi
          if echo "$MATRIX_JSON" | grep -q "cyrene-clang"; then
            if [ -n "$TC_DISPLAY" ]; then
              TC_DISPLAY="$TC_DISPLAY + Cyrene Clang"
            else
              TC_DISPLAY="Cyrene Clang"
            fi
          fi
          echo "## 🎛️ Epitaph Kernel — Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Setting | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Release Tag** | \`$RELEASE_TAG\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Configuration** | \`xxKSU + $TC_DISPLAY\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          
          if [ "$TRIGGER_RESULT" = "success" ]; then
            echo "✅ Build completed successfully." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ Build failed or was cancelled." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Send Finished Message to Telegram
        continue-on-error: true
        env:
          TG_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TG_ERROR_CHAT_ID: ${{ secrets.TELEGRAM_ERROR_CHAT_ID }}
          TRIGGER_RESULT: ${{ needs.trigger.result }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          MATRIX_JSON: ${{ needs.prepare.outputs.matrix }}
        run: |
          [ -z "$TG_BOT_TOKEN" ] && exit 0

          RUN_URL="https://github.com/${REPO}/actions/runs/${RUN_ID}"
          RELEASE_URL="https://github.com/${REPO}/releases/tag/${RELEASE_TAG}"

          TC_DISPLAY=""
          if echo "$MATRIX_JSON" | grep -q "zyc-latest"; then
            TC_DISPLAY="ZyClang"
          fi
          if echo "$MATRIX_JSON" | grep -q "cyrene-clang"; then
            if [ -n "$TC_DISPLAY" ]; then
              TC_DISPLAY="$TC_DISPLAY + Cyrene Clang"
            else
              TC_DISPLAY="Cyrene Clang"
            fi
          fi

          if [ "$TRIGGER_RESULT" = "success" ]; then
            # Sukses → kirim ke channel update
            [ -z "$TG_CHAT_ID" ] && exit 0
            MESSAGE=$(printf '👑 <b>EPITAPH KERNEL · Compiled Successfully</b>\n────────────────\n📦 <b>Release:</b> %s\n📱 <b>Device:</b> Redmi 12 (fire) · G88\n🛠️ <b>Compiler:</b> %s\n⚡ <b>Feature:</b> xxKSU [No-SUSFS]\n────────────────\n📦 <a href="%s">GitHub Release</a> · 🔍 <a href="%s">Actions Log</a>' \
              "$RELEASE_TAG" "$TC_DISPLAY" "$RELEASE_URL" "$RUN_URL")
            curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
              --form-string "chat_id=${TG_CHAT_ID}" --form-string "text=${MESSAGE}" --form-string "parse_mode=HTML"
          else
            # Gagal → kirim ke channel error dump
            [ -z "$TG_ERROR_CHAT_ID" ] && exit 0
            MESSAGE=$(printf '❌ <b>EPITAPH KERNEL · Compilation Failed</b>\n────────────────\n💥 <b>Build:</b> %s\n📱 <b>Device:</b> Redmi 12 (fire) · G88\n🛠️ <b>Compiler:</b> %s\n⚡ <b>Feature:</b> xxKSU [No-SUSFS]\n────────────────\n🔍 <a href="%s">Actions Log</a>' \
              "$RELEASE_TAG" "$TC_DISPLAY" "$RUN_URL")
            curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
              --form-string "chat_id=${TG_ERROR_CHAT_ID}" --form-string "text=${MESSAGE}" --form-string "parse_mode=HTML"
          fi
