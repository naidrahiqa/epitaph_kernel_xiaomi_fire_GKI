name: "рџЋ›пёЏ GKI Control Center"

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release Tag"
        required: true
        default: "v1.0"
      clang_toolchain:
        description: "Clang Toolchain"
        required: true
        type: choice
        options:
          - zyc-latest
          - cyrene-clang
        default: "zyc-latest"

permissions:
  actions: write
  contents: write

jobs:
  prepare:
    name: "рџ“‹ Prepare Build Matrix"
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      total: ${{ steps.matrix.outputs.total }}
      release_tag: ${{ steps.tag.outputs.release_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release_tag
        id: tag
        shell: bash
        env:
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          if [ -n "$INPUT_RELEASE_TAG" ]; then
            TAG="$INPUT_RELEASE_TAG"
          else
            # Auto-generate from commit count for push triggers
            TAG="v$(git rev-list --count HEAD)"
          fi
          if [[ ! "$TAG" =~ ^v[0-9] ]]; then
            echo "вќЊ ERROR: release_tag must start with 'v' followed by a number"
            exit 1
          fi
          echo "release_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "вњ… release_tag: $TAG"

      - name: "рџ“Љ Show Build Plan"
        env:
          CLANG_TOOLCHAIN: ${{ github.event.inputs.clang_toolchain || 'zyc-latest' }}
        run: |
          if [ "$CLANG_TOOLCHAIN" = "cyrene-clang" ]; then
            TC_DISPLAY="Cyrene Clang"
          else
            TC_DISPLAY="ZyClang"
          fi
          echo "## рџЋ›пёЏ Epitaph Kernel Build" >> "$GITHUB_STEP_SUMMARY"
          echo "**Release Tag:** \`${{ steps.tag.outputs.release_tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Configuration:** xxKSU + $TC_DISPLAY (single build)" >> "$GITHUB_STEP_SUMMARY"

  notify_start:
    name: "рџљЂ Notify Telegram (Starting)"
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Send Start Message to Telegram
        continue-on-error: true
        env:
          TG_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          ACTOR: ${{ github.actor }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
          CLANG_TOOLCHAIN: ${{ github.event.inputs.clang_toolchain || 'zyc-latest' }}
        run: |
          if [ -z "$TG_BOT_TOKEN" ] || [ -z "$TG_CHAT_ID" ]; then
            echo "вќЊ Telegram secrets not set. Skipping."
            exit 0
          fi

          RUN_URL="https://github.com/${REPO}/actions/runs/${RUN_ID}"
          
          if [ "$CLANG_TOOLCHAIN" = "cyrene-clang" ]; then
            TC_DISPLAY="Cyrene Clang"
          else
            TC_DISPLAY="ZyClang"
          fi

          MESSAGE=$(printf 'рџ”Ґ <b>EPITAPH KERNEL В· Build Starting</b>\nв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ\nрџљЂ <b>Build:</b> %s\nрџ“± <b>Device:</b> Redmi 12 (fire) В· G88\nрџ› пёЏ <b>Compiler:</b> %s\nвљЎ <b>Feature:</b> xxKSU [No-SUSFS]\nрџ‘¤ <b>Actor:</b> %s\nв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ\nрџ”Ќ <a href="%s">Monitor Build Progress on GitHub Actions</a>' \
            "$RELEASE_TAG" "$TC_DISPLAY" "$ACTOR" "$RUN_URL")
          
          echo "Sending to Chat ID: ${TG_CHAT_ID}"
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}\n" -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            --form-string "chat_id=${TG_CHAT_ID}" \
            --form-string "text=${MESSAGE}" \
            --form-string "parse_mode=HTML")
          
          echo "=== Telegram Response ==="
          echo "$RESPONSE"
          echo "========================="
          
          if echo "$RESPONSE" | grep -q "HTTP_STATUS:200"; then
            echo "вњ… Message sent successfully!"
          else
            echo "вќЊ Failed to send message!"
            exit 1
          fi

  trigger:
    needs: [prepare, notify_start]
    uses: ./.github/workflows/_build_kernel_core.yml
    secrets: inherit
    with:
      with_susfs: 'false'
      custom_name: "Epitaph"
      author_name: "Naidrahiqa"
      ksu_method: "xxksu"
      clang_toolchain: "${{ github.event.inputs.clang_toolchain || 'zyc-latest' }}"
      release_tag: "${{ needs.prepare.outputs.release_tag }}"

  summary:
    name: "рџ“Љ Summary & Notify"
    needs: [prepare, trigger]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Write Summary
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          TRIGGER_RESULT: ${{ needs.trigger.result }}
          CLANG_TOOLCHAIN: ${{ github.event.inputs.clang_toolchain || 'zyc-latest' }}
        run: |
          if [ "$CLANG_TOOLCHAIN" = "cyrene-clang" ]; then
            TC_DISPLAY="Cyrene Clang"
          else
            TC_DISPLAY="ZyClang"
          fi
          echo "## рџЋ›пёЏ Epitaph Kernel вЂ” Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Setting | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Release Tag** | \`$RELEASE_TAG\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Configuration** | \`xxKSU + $TC_DISPLAY\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          
          if [ "$TRIGGER_RESULT" = "success" ]; then
            echo "вњ… Build completed successfully." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "вќЊ Build failed or was cancelled." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Send Finished Message to Telegram
        continue-on-error: true
        env:
          TG_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TG_ERROR_CHAT_ID: ${{ secrets.TELEGRAM_ERROR_CHAT_ID }}
          TRIGGER_RESULT: ${{ needs.trigger.result }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          CLANG_TOOLCHAIN: ${{ github.event.inputs.clang_toolchain || 'zyc-latest' }}
        run: |
          [ -z "$TG_BOT_TOKEN" ] && exit 0

          RUN_URL="https://github.com/${REPO}/actions/runs/${RUN_ID}"
          RELEASE_URL="https://github.com/${REPO}/releases/tag/${RELEASE_TAG}"

          if [ "$CLANG_TOOLCHAIN" = "cyrene-clang" ]; then
            TC_DISPLAY="Cyrene Clang"
          else
            TC_DISPLAY="ZyClang"
          fi

          if [ "$TRIGGER_RESULT" = "success" ]; then
            # Sukses в†’ kirim ke channel update
            [ -z "$TG_CHAT_ID" ] && exit 0
            MESSAGE=$(printf 'рџ‘‘ <b>EPITAPH KERNEL В· Compiled Successfully</b>\nв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ\nрџ“¦ <b>Release:</b> %s\nрџ“± <b>Device:</b> Redmi 12 (fire) В· G88\nрџ› пёЏ <b>Compiler:</b> %s\nвљЎ <b>Feature:</b> xxKSU [No-SUSFS]\nв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ\nрџ“¦ <a href="%s">GitHub Release</a> В· рџ”Ќ <a href="%s">Actions Log</a>' \
              "$RELEASE_TAG" "$TC_DISPLAY" "$RELEASE_URL" "$RUN_URL")
            curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
              --form-string "chat_id=${TG_CHAT_ID}" --form-string "text=${MESSAGE}" --form-string "parse_mode=HTML"
          else
            # Gagal в†’ kirim ke channel error dump
            [ -z "$TG_ERROR_CHAT_ID" ] && exit 0
            MESSAGE=$(printf 'вќЊ <b>EPITAPH KERNEL В· Compilation Failed</b>\nв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ\nрџ’Ґ <b>Build:</b> %s\nрџ“± <b>Device:</b> Redmi 12 (fire) В· G88\nрџ› пёЏ <b>Compiler:</b> %s\nвљЎ <b>Feature:</b> xxKSU [No-SUSFS]\nв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ\nрџ”Ќ <a href="%s">Actions Log</a>' \
              "$RELEASE_TAG" "$TC_DISPLAY" "$RUN_URL")
            curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
              --form-string "chat_id=${TG_ERROR_CHAT_ID}" --form-string "text=${MESSAGE}" --form-string "parse_mode=HTML"
          fi
