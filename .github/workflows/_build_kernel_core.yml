name: "Core GKI Build Workflow"

on:
  workflow_call:
    inputs:
      with_susfs:
        required: true
        type: string
        default: 'false'
      custom_name:
        required: true
        type: string
        default: 'Epitaph'
      author_name:
        required: true
        type: string
        default: 'Naidrahiqa'
      ksu_method:
        required: true
        type: string
        default: 'xxksu'
      clang_toolchain:
        required: true
        type: string
        default: 'zyc-latest'
      release_tag:
        required: true
        type: string
        default: 'v1.0'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ANDROID_VERSION: android15
  KERNEL_VERSION: "6.6"
  KMI_GENERATION: ""
  GIT_CHANGELOG: ""
  KSU_VERSION: ""
  RESCUE_VER: ""
  SUSFS_OK: "false"
  ZIP_NAME: ""
  TOOLCHAIN_NAME: ""
  TOOLCHAIN_VER: ""
  BUILD_TIME: ""

jobs:
  build:
    name: "Build GKI (ZyClang)"
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cleanup Disk Space
        run: |
          START_TIME=$(date +%s)
          echo "=== 🧹 Membersihkan Ruang Disk Runner ==="
          df -h
          
          # Hapus perkakas bawaan runner yang tidak diperlukan
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/share/swift /usr/share/miniconda /usr/local/share/chromium \
            /usr/local/share/powershell /usr/local/bin/aliyun /usr/local/bin/azcopy \
            /usr/local/bin/cmake-gui /var/lib/docker
          
          # Bersihkan cache apt dan paket yang tidak terpakai
          sudo apt-get remove -y '^dotnet-.*' '^llvm-.*' 'php.*' \
            azure-cli google-cloud-cli google-chrome-stable firefox \
            powershell mono-devel || true
          sudo apt-get autoremove -y
          sudo apt-get clean
          
          # Bersihkan Docker secara menyeluruh
          sudo docker system prune -a -f --volumes || true
          
          echo "=== Ruang Disk Pasca-Pembersihan ==="
          df -h
          
          mkdir -p /tmp/build_metrics
          echo "$(date +%s)" > /tmp/build_metrics/start_total
          echo "Pembersihan Ruang Disk,$START_TIME,$(date +%s)" >> /tmp/build_metrics/steps.csv

      - name: Debug Inputs
        env:
          INPUT_SUSFS: ${{ inputs.with_susfs }}
          INPUT_NAME: ${{ inputs.custom_name }}
          INPUT_KSU: ${{ inputs.ksu_method }}
          INPUT_CLANG: ${{ inputs.clang_toolchain }}
          INPUT_TAG: ${{ inputs.release_tag }}
        run: |
          echo "=== WORKFLOW INPUTS ==="
          echo "with_susfs:      '$INPUT_SUSFS'"
          echo "custom_name:     '$INPUT_NAME'"
          echo "ksu_method:      '$INPUT_KSU'"
          echo "cpu_governor:    'schedutil'"
          echo "clang_toolchain: '$INPUT_CLANG'"
          echo "release_tag:     '$INPUT_TAG'"
          echo "========================"

      - name: Initialize Environment
        env:
          INPUT_NAME: ${{ inputs.custom_name }}
          INPUT_KSU: ${{ inputs.ksu_method }}
        run: |
          echo "TOOLCHAIN_NAME=ZyClang" >> $GITHUB_ENV
          BUILD_DATE=$(TZ='Asia/Jakarta' date '+%d%m%Y')
          echo "BUILD_DATE=${BUILD_DATE}" >> $GITHUB_ENV
          BASE_NAME="${INPUT_NAME}-ZyClang-${INPUT_KSU}-${BUILD_DATE}"
          echo "ZIP_NAME=${BASE_NAME}" >> $GITHUB_ENV
          echo "✅ Environment initialized: ${BASE_NAME}"



      - name: Prepare Kernel Build (Common)
        run: |
          START_TIME=$(date +%s)
          chmod +x "$GITHUB_WORKSPACE/scripts/prepare_kernel_build.sh"
          mkdir -p kernel
          # Tangkap log persiapan build ke file sementara agar bisa didiagnosis jika terjadi kegagalan
          if ! "$GITHUB_WORKSPACE/scripts/prepare_kernel_build.sh" \
            "core" \
            "${{ env.ANDROID_VERSION }}" \
            "${{ env.KERNEL_VERSION }}" \
            "${{ github.workspace }}" \
            "$GITHUB_ENV" \
            "${{ inputs.clang_toolchain }}" \
            "${{ inputs.ksu_method }}" \
            "${{ inputs.with_susfs }}" > /tmp/prep_build.log 2>&1; then
              cat /tmp/prep_build.log
              echo "❌ ERROR: prepare_kernel_build.sh failed!" > kernel/build.log
              tail -n 100 /tmp/prep_build.log >> kernel/build.log
              exit 1
          fi
          cat /tmp/prep_build.log
          echo "Persiapan Kernel Build,$START_TIME,$(date +%s)" >> /tmp/build_metrics/steps.csv

      - name: Diagnostic Before Configure
        run: |
          set -euo pipefail
          cd kernel/common
          echo "=== 🔍 DIAGNOSTIC REPORT ==="
          echo "📂 Git status short:"
          git status --short
          
          echo "📂 Verify KSU symbols in drivers/kernelsu/:"
          for sym in ksu_handle_input; do
            if grep -rq "$sym" drivers/kernelsu/ 2>/dev/null; then
              echo "  ✅ Symbol '$sym' exists in drivers/kernelsu/"
            else
              echo "  ❌ Symbol '$sym' MISSING in drivers/kernelsu/"
            fi
          done
          
          echo "📂 Initial defconfig checking for KSU:"
          grep -E "CONFIG_KSU=" arch/arm64/configs/gki_defconfig || echo "  None"
          echo "====================================="

      - name: Configure Kernel
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          cd kernel/common
          DEFCONFIG="arch/arm64/configs/gki_defconfig"
          GOVERNOR="schedutil"

          add_cfg() {
            local cfg="$1"
            sed -i "/^${cfg%%=*}=.*/d" "$DEFCONFIG"
            echo "$cfg" >> "$DEFCONFIG"
          }

          echo "" >> "$DEFCONFIG"
          echo "# KernelSU + Dependencies" >> "$DEFCONFIG"
          add_cfg "CONFIG_KSU=y"
          # PENTING: Kconfig milik KernelSU bergantung pada CONFIG_KPROBES dan CONFIG_EXT4_FS.
          # Jika salah satu dari fitur ini tidak aktif, kompilasi KernelSU akan diabaikan (CONFIG_KSU=n) yang memicu bootloop.
          add_cfg "CONFIG_KPROBES=y"
          add_cfg "CONFIG_HAVE_KPROBES=y"
          add_cfg "CONFIG_KPROBE_EVENTS=y"
          add_cfg "CONFIG_EXT4_FS=y"

          echo "" >> "$DEFCONFIG"
          echo "# Energy Model" >> "$DEFCONFIG"
          add_cfg "CONFIG_ENERGY_MODEL=y"

          echo "" >> "$DEFCONFIG"
          echo "# Module Compatibility" >> "$DEFCONFIG"
          add_cfg "CONFIG_MODULE_SIG_FORCE=n"
          add_cfg "CONFIG_MODULE_SIG_ALL=n"
          add_cfg "CONFIG_MODULE_SIG_PROTECT=n"
          add_cfg "CONFIG_MODVERSIONS=y"

          echo "" >> "$DEFCONFIG"
          echo "# CPU Governor" >> "$DEFCONFIG"
          add_cfg "CONFIG_CPU_FREQ_GOV_SCHEDUTIL=y"
          sed -i '/^CONFIG_CPU_FREQ_DEFAULT_GOV_/d' "$DEFCONFIG"
          add_cfg "CONFIG_CPU_FREQ_DEFAULT_GOV_SCHEDUTIL=y"

          echo "" >> "$DEFCONFIG"
          echo "# ZRAM & Memory Optimizations" >> "$DEFCONFIG"
          add_cfg "CONFIG_ZSMALLOC=m"
          add_cfg "CONFIG_ZRAM=m"
          add_cfg "CONFIG_CRYPTO_ZSTD=y"
          add_cfg "CONFIG_ZRAM_MULTI_COMP=y"
          add_cfg "CONFIG_ZRAM_DEF_COMP_ZSTD=y"
          add_cfg "CONFIG_CRYPTO_LZ4=y"
          add_cfg "CONFIG_ZRAM_DEF_COMP_LZ4=y"

          echo "" >> "$DEFCONFIG"
          echo "# MGLRU Memory Reclamation" >> "$DEFCONFIG"
          add_cfg "CONFIG_LRU_GEN=y"
          add_cfg "CONFIG_LRU_GEN_ENABLED=y"
          add_cfg "CONFIG_LRU_GEN_STATS=n"

          echo "" >> "$DEFCONFIG"
          echo "# HZ=300 Scheduler Tuning" >> "$DEFCONFIG"
          add_cfg "CONFIG_HZ_300=y"
          add_cfg "CONFIG_HZ=300"

          echo "" >> "$DEFCONFIG"
          echo "# I/O Schedulers" >> "$DEFCONFIG"
          add_cfg "CONFIG_IOSCHED_BFQ=y"
          add_cfg "CONFIG_BFQ_GROUP_IOSCHED=y"
          add_cfg "CONFIG_MQ_IOSCHED_KYBER=y"

          echo "" >> "$DEFCONFIG"
          echo "# TCP BBR & FQ Scheduling" >> "$DEFCONFIG"
          add_cfg "CONFIG_TCP_CONG_BBR=y"
          add_cfg "CONFIG_NET_SCH_FQ=y"
          add_cfg 'CONFIG_DEFAULT_TCP_CONG="bbr"'

          echo "" >> "$DEFCONFIG"
          echo "# WireGuard VPN Support" >> "$DEFCONFIG"
          add_cfg "CONFIG_WIREGUARD=y"

          echo "" >> "$DEFCONFIG"
          echo "# WiFi & Connectivity" >> "$DEFCONFIG"
          add_cfg "CONFIG_CFG80211=m"
          add_cfg "CONFIG_NL80211_TESTMODE=y"
          add_cfg "CONFIG_CFG80211_WEXT=y"
          add_cfg "CONFIG_MAC80211=m"

          echo "" >> "$DEFCONFIG"
          echo "# Netfilter for Hotspot/Tethering (IPv4 + IPv6)" >> "$DEFCONFIG"
          add_cfg "CONFIG_NETFILTER=y"
          add_cfg "CONFIG_NF_CONNTRACK=y"
          add_cfg "CONFIG_NF_NAT=y"
          add_cfg "CONFIG_NF_NAT_MASQUERADE=y"
          add_cfg "CONFIG_IP_NF_IPTABLES=y"
          add_cfg "CONFIG_IP_NF_NAT=y"
          add_cfg "CONFIG_IP_NF_TARGET_MASQUERADE=y"
          add_cfg "CONFIG_IP6_NF_IPTABLES=y"
          add_cfg "CONFIG_IP6_NF_NAT=y"
          add_cfg "CONFIG_IP6_NF_TARGET_MASQUERADE=y"
          add_cfg "CONFIG_NETFILTER_XT_NAT=y"
          add_cfg "CONFIG_NETFILTER_XT_TARGET_MASQUERADE=y"

          # Branding — Custom name with build number
          BUILD_VER="${{ github.run_number }}"
          sed -i '/CONFIG_LOCALVERSION/d' $DEFCONFIG
          echo "" >> $DEFCONFIG
          echo "# Branding" >> $DEFCONFIG
          echo "CONFIG_LOCALVERSION=\"-Epitaph-v${BUILD_VER}\"" >> $DEFCONFIG
          echo "CONFIG_LOCALVERSION_AUTO=n" >> $DEFCONFIG

          # PStore (RAMoops) — Kernel-side support only.
          # CATATAN: CONFIG_PSTORE_RAM_MEM_ADDR dan CONFIG_PSTORE_RAM_SIZE TIDAK EXIST di GKI 6.6.
          # PStore memory region harus di-reserve via Device Tree or kernel cmdline (ramoops.mem_address).
          echo "" >> "$DEFCONFIG"
          echo "# PStore / RAMoops Debugging" >> "$DEFCONFIG"
          add_cfg "CONFIG_PSTORE=y"
          add_cfg "CONFIG_PSTORE_CONSOLE=y"
          add_cfg "CONFIG_PSTORE_PMSG=y"
          add_cfg "CONFIG_PSTORE_RAM=y"

          git add arch/arm64/configs/gki_defconfig
          echo "✅ Defconfig finalized and added to git"

          # CRITICAL: Lakukan commit untuk seluruh perubahan di common/ (KSU, SUSFS, patches, defconfig)
          # agar terdeteksi sepenuhnya oleh Bazel Kleaf sandbox.
          git -c user.email="ci@epitaph" -c user.name="Epitaph CI" \
            commit -m "ci: finalize kernel configuration and defconfig" \
            --allow-empty 2>/dev/null || true
          echo "✅ Staged changes committed to git HEAD"

          # Force regenerate kheaders archive list
          touch kernel/kheaders.c
          # Pastikan gen_kheaders.sh akan re-run
          rm -f kernel/kheaders_data.tar.xz 2>/dev/null || true
          
          # Disable kheaders as a last resort fallback if EPITAPH_DISABLE_IKHEADERS is set to 1
          if [ "${EPITAPH_DISABLE_IKHEADERS:-0}" = "1" ]; then
            echo "⚠️ Last resort: Disabling CONFIG_IKHEADERS as requested..."
            add_cfg "CONFIG_IKHEADERS=n"
            # Re-stage and commit if we modified defconfig
            git add arch/arm64/configs/gki_defconfig
            git -c user.email="ci@epitaph" -c user.name="Epitaph CI" \
              commit -m "ci: disable kheaders as last resort" \
              --allow-empty 2>/dev/null || true
          fi
          echo "Konfigurasi Kernel,$START_TIME,$(date +%s)" >> /tmp/build_metrics/steps.csv

      - name: Build Kernel (ZyClang)
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          cd kernel/common
          if [ -z "${CUSTOM_CLANG_PATH:-}" ]; then
            echo "❌ ERROR: CUSTOM_CLANG_PATH not set!"
            exit 1
          fi
          export PATH="$CUSTOM_CLANG_PATH/bin:$PATH"
          which clang || { echo "❌ clang not in PATH!"; exit 1; }
          
          # Deteksi arsitektur target Clang demi jaminan kompatibilitas kompilasi silang
          CLANG_TRIPLE=$(clang -dumpmachine)
          echo "✅ Using Clang Triple: $CLANG_TRIPLE"

          MAKE_ARGS="O=out ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            CLANG_TRIPLE=$CLANG_TRIPLE HOSTLDFLAGS=-fuse-ld=bfd"

          make $MAKE_ARGS gki_defconfig
          
          # Kompilasi Citra Kernel dan Modul Driver
          # PENTING: Utamakan hasil kompilasi Image.gz agar perangkat MediaTek dapat memuat kernel dengan sukses tanpa kendala.
          make -j$(nproc) $MAKE_ARGS Image.gz Image.lz4 modules 2>&1 | tee ../build.log
          echo "Kompilasi Kernel (Kustom),$START_TIME,$(date +%s)" >> /tmp/build_metrics/steps.csv
        env:
          SOURCE_DATE_EPOCH: "0"

      - name: Extract Build Output
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          mkdir -p $GITHUB_WORKSPACE/dist
          for img in \
            kernel/common/out/arch/arm64/boot/Image \
            kernel/common/out/arch/arm64/boot/Image.gz \
            kernel/common/out/arch/arm64/boot/Image.lz4; do
            if [ -f "$img" ]; then
              cp -v "$img" "$GITHUB_WORKSPACE/dist/"
            fi
          done
          for mod in cfg80211.ko mac80211.ko; do
            FOUND=$(find kernel/common/out -name "$mod" -type f 2>/dev/null | head -1)
            if [ -n "$FOUND" ]; then
              cp -v "$FOUND" "$GITHUB_WORKSPACE/dist/"
              echo "✅ Extracted module: $mod"
            fi
          done
          echo "📦 dist/ contents:"
          ls -lah $GITHUB_WORKSPACE/dist/ || true
          echo "Ekstraksi Output Build,$START_TIME,$(date +%s)" >> /tmp/build_metrics/steps.csv

      - name: Verify Build
        run: |
          START_TIME=$(date +%s)
          HAS_IMAGE=false
          for f in dist/Image dist/Image.gz dist/Image.lz4; do
            if [ -f "$f" ]; then
              SIZE=$(du -h "$f" 2>/dev/null | cut -f1 || echo "?")
              echo "✅ Found: $f ($SIZE)"
              HAS_IMAGE=true
            fi
          done
          if [ "$HAS_IMAGE" = "false" ]; then
            echo "❌ No kernel image found in dist/!"
            ls -lah dist/ || echo "  (empty or missing)"
            exit 1
          fi
          echo "✅ Verify Build passed."
          echo "Verifikasi Build Utama,$START_TIME,$(date +%s)" >> /tmp/build_metrics/steps.csv

      - name: Upload Debug Artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: "Debug-${{ env.ZIP_NAME }}"
          path: |
            kernel/build.log
            kernel/common/build.log
            kernel/common/arch/arm64/configs/gki_defconfig
            dist/Image*
          if-no-files-found: warn
          retention-days: 7

      - name: Generate Changelog
        run: |
          START_TIME=$(date +%s)
          python3 workflow_scripts/generate_changelog.py || echo "# Changelog generation failed" > changelog.md
          # Use a unique delimiter that won't appear in changelog content
          DELIMITER=$(cat /proc/sys/kernel/random/uuid)
          echo "GIT_CHANGELOG<<${DELIMITER}" >> $GITHUB_ENV
          cat changelog.md >> $GITHUB_ENV
          echo "${DELIMITER}" >> $GITHUB_ENV
          echo "Generate Changelog,$START_TIME,$(date +%s)" >> /tmp/build_metrics/steps.csv

      - name: Package AnyKernel3
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          CUSTOM_NAME="${{ inputs.custom_name }}"
          BUILD_VER="${{ github.run_number }}"
          AUTHOR="${{ inputs.author_name }}"
          GOVERNOR="schedutil"
          TOOLCHAIN_SHORT="${{ env.TOOLCHAIN_NAME }}"
          BASE_NAME="${{ env.ZIP_NAME }}"

          # PINNED FORK: Menggunakan fork AnyKernel3 milik Naidrahiqa untuk menghindari perubahan upstream yang tidak kompatibel.
          # Jika gagal clone (misal karena repositori belum dibuat/masih privat), lakukan fallback otomatis ke osm0sis/AnyKernel3 resmi.
          echo "📥 Cloning AnyKernel3 template..."
          CLONED=false
          if git clone --depth=1 https://github.com/Naidrahiqa/AnyKernel3.git ak3 2>/dev/null; then
            CLONED=true
            echo "✅ Successfully cloned Naidrahiqa/AnyKernel3 fork"
          else
            echo "⚠️ Failed to clone Naidrahiqa/AnyKernel3, trying fallback to official osm0sis/AnyKernel3..."
            if git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git ak3; then
              CLONED=true
              echo "✅ Successfully cloned official osm0sis/AnyKernel3 as fallback"
            fi
          fi

          if [ "$CLONED" != "true" ]; then
            echo "❌ ERROR: Failed to clone AnyKernel3 template from all sources!"
            exit 1
          fi

          cd ak3

          KERNEL_STRING="Epitaph-${CUSTOM_NAME}-v${BUILD_VER} [GKI 6.6 | SUSFS | ${GOVERNOR} | ${TOOLCHAIN_SHORT}] by ${AUTHOR}"

          printf '%s\n' \
            '# AnyKernel3 Ramdisk Mod Script' \
            'properties() {' \
            "kernel.string=${KERNEL_STRING}" \
            'do.devicecheck=1' \
            'do.modules=1' \
            'do.systemless=1' \
            'do.cleanup=1' \
            'do.cleanuponabort=0' \
            'device.name1=fire' \
            'device.name2=Redmi 12' \
            'supported.versions=15' \
            'supported.patchlevels=' \
            '}' \
            '' \
            'block=boot;' \
            'is_slot_device=auto;' \
            'ramdisk_compression=auto;' \
            'patch_vbmeta_flag=0;' \
            '' \
            '. tools/ak3-core.sh;' \
            'dump_boot;' \
            'write_boot;' > anykernel.sh

          # ─── COPY WIFI MODULES ──────────────────────────────────────
          MODULES_DIR="modules/vendor/lib/modules"
          mkdir -p "$MODULES_DIR"

          echo "🔍 Searching for modules in dist/..."
          find "$GITHUB_WORKSPACE/dist" -name "*.ko" -type f -exec cp -v {} "$MODULES_DIR/" \;
          
          if [ "$(ls -A $MODULES_DIR)" ]; then
            echo "✅ Modules successfully copied to AnyKernel3"
            MODULES_FOUND=true
          else
            echo "❌ ERROR: No modules found in dist/! WiFi will fail to load."
            exit 1
          fi
          # ─── END MODULE COPY ────────────────────────────────────────

          # 🎛️ EPITAPH TUNER & WIFI FALLBACK (PERSISTENT):
          # Skrip di-shipped dari repo sebagai file terpisah (scripts/epitaph_tuner.sh)
          # agar lebih mudah dimaintain dan di-debug dibandingkan inline heredoc.
          echo "" >> anykernel.sh
          echo "# Epitaph Tuner & WiFi Fallback via KernelSU/Magisk" >> anykernel.sh
          echo "if [ -d /data/adb/service.d ]; then" >> anykernel.sh
          echo "  ui_print \"  • Setting up Epitaph Tuner & WiFi fallback...\";" >> anykernel.sh
          echo "  mkdir -p /data/adb/wifi_fix;" >> anykernel.sh
          echo "  cp -f modules/vendor/lib/modules/*.ko /data/adb/wifi_fix/;" >> anykernel.sh
          echo "  chmod 644 /data/adb/wifi_fix/*.ko;" >> anykernel.sh
          echo "  " >> anykernel.sh
          echo "  cat << 'INNER_EOF' > /data/adb/service.d/epitaph_tuner.sh" >> anykernel.sh
          cat "$GITHUB_WORKSPACE/scripts/epitaph_tuner.sh" >> anykernel.sh
          echo "" >> anykernel.sh
          echo "INNER_EOF" >> anykernel.sh
          echo "  " >> anykernel.sh
          echo "  chmod 755 /data/adb/service.d/epitaph_tuner.sh;" >> anykernel.sh
          echo "  ui_print \"  • Epitaph Tuner & WiFi fallback configured successfully!\";" >> anykernel.sh
          echo "fi" >> anykernel.sh
          # ─── END EPITAPH TUNER & WIFI FALLBACK LOADER ───────────────

          SELECTED_IMG=""
          # PEMILIHAN CITRA KERNEL:
          # Kita prioritaskan Image.gz karena bootloader MediaTek pada Redmi 12 (Helio G88)
          # sering kali menolak mentah-mentah file citra uncompressed ('Image').
          # Urutan prioritas: Image.gz (kompatibilitas terbaik) -> Image.lz4 -> Image raw (cadangan).
          for img in \
            "$GITHUB_WORKSPACE/dist/Image.gz" \
            "$GITHUB_WORKSPACE/dist/Image.lz4" \
            "$GITHUB_WORKSPACE/dist/Image"; do
            if [ -f "$img" ]; then
              cp "$img" .
              SELECTED_IMG=$(basename "$img")
              echo "✅ Using kernel image: $SELECTED_IMG"
              break
            fi
          done
          [ -z "$SELECTED_IMG" ] && echo "❌ No kernel image found!" && exit 1

          zip -r9 "$GITHUB_WORKSPACE/dist/${BASE_NAME}-AnyKernel3.zip" . -x ".git*" "*.md" "LICENSE"
          echo "✅ Package created: ${BASE_NAME}-AnyKernel3.zip"
          echo "Pemaketan AnyKernel3,$START_TIME,$(date +%s)" >> /tmp/build_metrics/steps.csv

      - name: Verify Build & Smoke Test
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          echo "=== 🛡️ Memulai Uji Asap (Smoke Test) Pasca-Build ==="
          
          # 1. Verifikasi keberadaan dan ukuran Image.gz (minimal 5MB)
          IMAGE_PATH="dist/Image.gz"
          if [ ! -f "$IMAGE_PATH" ]; then
            echo "❌ ERROR: Image.gz tidak ditemukan di folder dist/!"
            exit 1
          fi
          
          IMAGE_SIZE=$(stat -c%s "$IMAGE_PATH")
          echo "ℹ️ Image.gz ditemukan, ukuran: $((IMAGE_SIZE / 1024 / 1024)) MB ($IMAGE_SIZE bytes)"
          if [ "$IMAGE_SIZE" -lt 5242880 ]; then
            echo "❌ ERROR: Image.gz terlalu kecil ($((IMAGE_SIZE / 1024 / 1024)) MB), di bawah batas minimum 5MB!"
            exit 1
          fi
          
          # 2. Verifikasi keberadaan dan ukuran AnyKernel3 ZIP (minimal 5MB)
          ZIP_PATH=$(ls dist/*-AnyKernel3.zip 2>/dev/null | head -n1 || echo "")
          if [ -z "$ZIP_PATH" ] || [ ! -f "$ZIP_PATH" ]; then
            echo "❌ ERROR: Berkas AnyKernel3 ZIP tidak ditemukan di folder dist/!"
            exit 1
          fi
          
          ZIP_SIZE=$(stat -c%s "$ZIP_PATH")
          echo "ℹ️ AnyKernel3 ZIP ditemukan: $(basename $ZIP_PATH), ukuran: $((ZIP_SIZE / 1024 / 1024)) MB ($ZIP_SIZE bytes)"
          if [ "$ZIP_SIZE" -lt 5242880 ]; then
            echo "❌ ERROR: AnyKernel3 ZIP terlalu kecil ($((ZIP_SIZE / 1024 / 1024)) MB), di bawah batas minimum 5MB!"
            exit 1
          fi
          
          echo "✅ UJI ASAP BERHASIL: Semua berkas utama valid dan melebihi ukuran minimum 5MB."
          echo "Uji Asap Pasca-Build,$START_TIME,$(date +%s)" >> /tmp/build_metrics/steps.csv

      - name: Initialize Release Metadata
        run: |
          echo "BUILD_TIME=$(TZ='Asia/Jakarta' date '+%Y-%m-%d %H:%M WIB')" >> $GITHUB_ENV
          
          # Fetch the latest rescue tool version tag from GitHub API
          RESCUE_TAG=$(curl -s https://api.github.com/repos/naidrahiqa/epitaph_rescue/releases/latest | grep -oP '"tag_name": "\K[^"]+' || echo "")
          if [ -z "$RESCUE_TAG" ]; then
            RESCUE_TAG="v0.3.0"  # Fallback default if API call fails
          fi
          echo "RESCUE_VER=${RESCUE_TAG}" >> $GITHUB_ENV

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: "${{ env.ZIP_NAME }}"
          path: dist/*.zip
          if-no-files-found: error
          retention-days: 30

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ inputs.release_tag }}"
          name: "Epitaph Kernel ${{ inputs.release_tag }}"
          body: |
            ${{ env.GIT_CHANGELOG }}

            ---

            ### 🔧 Emergency & Rescue
            * 🚨 **Bootloop?** Download the portable [Epitaph Rescue Tool ${{ env.RESCUE_VER }}](https://github.com/naidrahiqa/epitaph_rescue/releases/tag/${{ env.RESCUE_VER }}) to automatically restore stock and extract RAMoops logs with a single click.
            * Flash the official stock `boot.img` via Fastboot to recover:
              ```bash
              fastboot flash boot boot_stock.img
              ```

            ---

            > ⚠️ **Prerequisite:** Make sure to disable verified boot verification via Fastboot:
            > ```
            > fastboot --disable-verity --disable-verification flash vbmeta vbmeta.img
            > fastboot --disable-verity --disable-verification flash vbmeta_system vbmeta_system.img
            > fastboot --disable-verity --disable-verification flash vbmeta_vendor vbmeta_vendor.img
            > ```
            > Extract the `.img` files from your matching HyperOS 2 Fastboot ROM.
          files: dist/*.zip
          draft: false
          prerelease: false

      # ─── TELEGRAM: Upload zip ke channel update (per-build) ──────────
      - name: Send to Telegram (Success)
        if: success()
        continue-on-error: true
        env:
          TG_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          INPUT_KSU: ${{ inputs.ksu_method }}
          INPUT_SUSFS: ${{ inputs.with_susfs }}
          REPO: ${{ github.repository }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          [ -z "$TG_BOT_TOKEN" ] || [ -z "$TG_CHAT_ID" ] && exit 0
          ZIP_FILE=$(ls dist/*.zip 2>/dev/null | head -n 1)
          [ -z "$ZIP_FILE" ] && exit 0
          ZIP_NAME=$(basename "$ZIP_FILE")
          
          ZIP_BYTES=$(du -b "$ZIP_FILE" | cut -f1 || echo "0")
          ZIP_SIZE=$(du -h "$ZIP_FILE" | cut -f1 || echo "?")
          SUSFS_LABEL="None (No-Mount)"
          RELEASE_URL="https://github.com/${REPO}/releases/tag/${INPUT_RELEASE_TAG}"
          CAPTION=$(printf '👑 <b>Epitaph Kernel %s — Build Success!</b>\n━━━━━━━━━━━━━━━━━━━━━\n🚀 <b>GKI 6.6 Kernel for Redmi 12 (fire)</b>\nRunning Android 15 HyperOS 2.0\n\n📊 <b>System Metrics:</b>\n• <b>Root Method:</b> %s v%s\n• <b>Kernel KMI:</b> android15-%s\n• <b>Mount Mode:</b> %s\n• <b>Compiler Info:</b> %s\n• <b>Package Size:</b> %s\n• <b>Timestamp:</b> %s (run #%s)\n\n📝 <b>Changelog:</b>\n%s\n━━━━━━━━━━━━━━━━━━━━━\n📦 <b>GitHub Release & Download:</b>\n%s\n\n🔧 <b>Emergency Rescue & Diagnostics:</b>\n<a href="https://github.com/naidrahiqa/epitaph_rescue/releases/tag/%s">Epitaph Rescue Tool %s</a>' \
            "$INPUT_RELEASE_TAG" "$INPUT_KSU" "${KSU_VERSION}" "${KMI_GENERATION}" "$SUSFS_LABEL" \
            "${TOOLCHAIN_VER}" "$ZIP_SIZE" "${BUILD_TIME}" "$RUN_NUMBER" \
            "$(echo "${GIT_CHANGELOG}" | head -10)" "$RELEASE_URL" "${RESCUE_VER}" "${RESCUE_VER}")
          TG_API="https://api.telegram.org/bot${TG_BOT_TOKEN}"
          TG_LIMIT=52428800
          if [ "$ZIP_BYTES" -le "$TG_LIMIT" ]; then
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${TG_API}/sendDocument" \
              --form-string "chat_id=${TG_CHAT_ID}" \
              -F "document=@${ZIP_FILE};filename=${ZIP_NAME}" \
              --form-string "caption=${CAPTION}" --form-string "parse_mode=HTML" || echo "000")
            [ "$HTTP" != "200" ] && curl -s -X POST "${TG_API}/sendMessage" \
              --form-string "chat_id=${TG_CHAT_ID}" --form-string "text=${CAPTION}" --form-string "parse_mode=HTML"
          else
            curl -s -X POST "${TG_API}/sendMessage" \
              --form-string "chat_id=${TG_CHAT_ID}" --form-string "text=${CAPTION}" --form-string "parse_mode=HTML"
          fi

      # ─── TELEGRAM: Kirim error dump ke channel error dump (inline, tanpa .log) ──
      - name: Send Error Log to Telegram
        if: failure()
        continue-on-error: true
        env:
          TG_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_ERROR_CHAT_ID: ${{ secrets.TELEGRAM_ERROR_CHAT_ID }}
        run: |
          [ -z "$TG_BOT_TOKEN" ] || [ -z "$TG_ERROR_CHAT_ID" ] && exit 0
          TG_API="https://api.telegram.org/bot${TG_BOT_TOKEN}"
          ACTIONS_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # ─── 1. Gabungkan semua error log ───
          COMBINED_LOG="/tmp/combined_build.log"
          : > "$COMBINED_LOG"
          for log in "kernel/build.log" "kernel/common/build.log"; do
            [ -f "$log" ] && cat "$log" >> "$COMBINED_LOG"
          done
          REJ_FILES=$(find kernel/common -name "*.rej" 2>/dev/null | head -5)
          if [ -n "$REJ_FILES" ]; then
            echo "=== REJECTED PATCHES ===" >> "$COMBINED_LOG"
            for rej in $REJ_FILES; do echo "--- $rej ---" >> "$COMBINED_LOG"; cat "$rej" >> "$COMBINED_LOG"; done
          fi

          # ─── 2. Deteksi jenis error ───
          ERROR_TYPE="UNKNOWN ERROR"
          if grep -qiE "undefined reference|undefined symbol" "$COMBINED_LOG" 2>/dev/null; then
            ERROR_TYPE="LINKER ERROR (undefined symbol)"
          elif grep -qiE "error:.*\.c:[0-9]+:[0-9]+:" "$COMBINED_LOG" 2>/dev/null; then
            ERROR_TYPE="MAKE ERROR"
          elif grep -qiE "fatal error:.*\.h.*not found" "$COMBINED_LOG" 2>/dev/null; then
            ERROR_TYPE="MISSING HEADER"
          elif grep -qiE "patch.*does not apply|patch failed|git apply.*failed" "$COMBINED_LOG" 2>/dev/null; then
            ERROR_TYPE="PATCH ERROR"
          elif grep -qiE "no rule to make target|missing separator" "$COMBINED_LOG" 2>/dev/null; then
            ERROR_TYPE="MAKEFILE ERROR"
          elif grep -qiE "cannot find.*\.ko|module.*not found" "$COMBINED_LOG" 2>/dev/null; then
            ERROR_TYPE="MODULE ERROR"
          elif grep -qiE "Kconfig|syntax error|unexpected" "$COMBINED_LOG" 2>/dev/null; then
            ERROR_TYPE="CONFIG ERROR"
          fi

          # ─── 3. Deteksi step mana yang gagal ───
          FAILED_STEP="Build kernel (make error)"
          if grep -qE "prepare_kernel_build|clone.*failed|git clone" "$COMBINED_LOG" 2>/dev/null \
             && grep -qiE "error|failed" "$COMBINED_LOG" 2>/dev/null; then
            FAILED_STEP="Prepare kernel build (clone/patch error)"
          elif grep -qiE "SUSFS.*patch|susfs.*error" "$COMBINED_LOG" 2>/dev/null; then
            FAILED_STEP="Setup SUSFS (patch error)"
          elif grep -qiE "defconfig|CONFIG_" "$COMBINED_LOG" 2>/dev/null \
               && grep -qiE "error" "$COMBINED_LOG" 2>/dev/null; then
            FAILED_STEP="Configure kernel (config error)"
          fi

          # ─── 4. Ekstraksi error context yang clean (max 60 baris, skip noise) ───
          ERROR_CONTEXT=$(grep -iE "error:|fatal:|undefined reference|undefined symbol|warning:|note:" "$COMBINED_LOG" 2>/dev/null \
            | grep -v "^$" \
            | grep -vE "^make\[|^make:" \
            | grep -vE "^  (LD|CC|AR|OBJCOPY|LD \[M\])" \
            | tail -40 \
            | head -c 3000)

          # Kalau grep gagal, ambil 30 baris terakhir yang mengandung error
          if [ -z "$ERROR_CONTEXT" ]; then
            ERROR_CONTEXT=$(tail -50 "$COMBINED_LOG" 2>/dev/null | grep -iE "error|fatal|failed" | tail -30 | head -c 3000)
          fi

          # Kalau masih kosong, ambil 30 baris terakhir
          if [ -z "$ERROR_CONTEXT" ]; then
            ERROR_CONTEXT=$(tail -30 "$COMBINED_LOG" 2>/dev/null | head -c 3000)
          fi

          # ─── 5. Escape HTML special chars ───
          ERROR_CONTEXT=$(echo "$ERROR_CONTEXT" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')

          # ─── 6. Susun pesan format Pollux ───
          HEADER=$(printf '❌ <b>Epitaph Kernel — Build Failed</b>\n━━━━━━━━━━━━━━━━━━━━━\n📱 <b>Device:</b> Redmi 12 (fire) / MT6768\n🌐 <b>Tag:</b> %s\n⚠️ <b>Error:</b> %s\n📍 <b>Step:</b> %s\n━━━━━━━━━━━━━━━━━━━━━\n\n<b>Error Context:</b>\n<pre>%s</pre>\n━━━━━━━━━━━━━━━━━━━━━\n🔗 <a href="%s">🔍 Full Log on GitHub Actions</a>' \
            "${{ env.ZIP_NAME }}" "$ERROR_TYPE" "$FAILED_STEP" "$ERROR_CONTEXT" "$ACTIONS_URL")

          # ─── 7. Kirim pesan (max 4096 chars Telegram limit) ───
          MSG_LEN=${#HEADER}
          if [ "$MSG_LEN" -gt 4000 ]; then
            # Truncate error context kalau kepanjangan
            TRIMMED_LEN=$((4000 - ${#HEADER} + ${#ERROR_CONTEXT}))
            ERROR_CONTEXT=$(echo "$ERROR_CONTEXT" | head -c "$TRIMMED_LEN")
            HEADER=$(printf '❌ <b>Epitaph Kernel — Build Failed</b>\n━━━━━━━━━━━━━━━━━━━━━\n📱 <b>Device:</b> Redmi 12 (fire) / MT6768\n🌐 <b>Tag:</b> %s\n⚠️ <b>Error:</b> %s\n📍 <b>Step:</b> %s\n━━━━━━━━━━━━━━━━━━━━━\n\n<b>Error Context:</b>\n<pre>%s</pre>\n━━━━━━━━━━━━━━━━━━━━━\n🔗 <a href="%s">🔍 Full Log on GitHub Actions</a>' \
              "${{ env.ZIP_NAME }}" "$ERROR_TYPE" "$FAILED_STEP" "$ERROR_CONTEXT" "$ACTIONS_URL")
          fi

          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}\n" -X POST "${TG_API}/sendMessage" \
            --form-string "chat_id=${TG_ERROR_CHAT_ID}" \
            --form-string "text=${HEADER}" \
            --form-string "parse_mode=HTML")

          if echo "$RESPONSE" | grep -q "HTTP_STATUS:200"; then
            echo "✅ Error dump sent to Telegram successfully"
          else
            echo "❌ Failed to send error dump, dumping to step output"
            echo "$RESPONSE"
          fi

      - name: Post Build Summary Comment
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          INPUT_KSU: ${{ inputs.ksu_method }}
          ACTOR: ${{ github.actor }}
          EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          echo "=== 📢 Menulis Ringkasan Build ==="
          STATUS="❌ GAGAL (FAILED)"
          if [ "$JOB_STATUS" = "success" ]; then
            STATUS="✅ BERHASIL (SUCCESS)"
          fi
          
          {
            echo "## 🛠️ Epitaph Kernel Build Summary"
            echo "- **Status:** $STATUS"
            echo "- **Toolchain:** \`ZyClang\`"
            echo "- **Metode Root:** \`${INPUT_KSU}\` v${KSU_VERSION:-unknown}"
            echo "- **Integrasi SUSFS:** \`Ya (Integrated)\`"
            echo "- **Pemicu Build:** \`${ACTOR}\` via \`${EVENT_NAME}\`"
            echo "- **Tautan Alur Kerja:** [Klik di Sini](https://github.com/${REPO}/actions/runs/${RUN_ID})"
            echo ""
          } >> $GITHUB_STEP_SUMMARY

      - name: Report Build Performance Metrics
        if: always()
        run: |
          echo "=== 📊 Laporan Performa Waktu Build ==="
          METRICS_FILE="/tmp/build_metrics/steps.csv"
          if [ ! -f "$METRICS_FILE" ]; then
            echo "⚠️ Berkas metrik performa tidak ditemukan!"
            exit 0
          fi
          
          {
            echo ""
            echo "### 📊 Build Performance Metrics"
            echo "| Tahapan Build (Step Name) | Waktu Mulai | Waktu Selesai | Durasi (Detik/Menit) |"
            echo "| :--- | :--- | :--- | :--- |"
          } >> $GITHUB_STEP_SUMMARY
          
          TOTAL_DURATION=0
          while IFS=',' read -r step start end || [ -n "$step" ]; do
            if [ -n "$step" ] && [ -n "$start" ] && [ -n "$end" ]; then
              duration=$((end - start))
              TOTAL_DURATION=$((TOTAL_DURATION + duration))
              min=$((duration / 60))
              sec=$((duration % 60))
              formatted_dur=""
              if [ "$min" -gt 0 ]; then
                formatted_dur="${min}m ${sec}s"
              else
                formatted_dur="${sec}s"
              fi
              
              # Dapatkan waktu berformat manusia
              start_human=$(date -d "@$start" '+%H:%M:%S' 2>/dev/null || echo "$start")
              end_human=$(date -d "@$end" '+%H:%M:%S' 2>/dev/null || echo "$end")
              
              echo "| $step | $start_human | $end_human | $formatted_dur |" >> $GITHUB_STEP_SUMMARY
            fi
          done < "$METRICS_FILE"
          
          tot_min=$((TOTAL_DURATION / 60))
          tot_sec=$((TOTAL_DURATION % 60))
          echo "| **Total Waktu Build** | - | - | **${tot_min}m ${tot_sec}s** |" >> $GITHUB_STEP_SUMMARY