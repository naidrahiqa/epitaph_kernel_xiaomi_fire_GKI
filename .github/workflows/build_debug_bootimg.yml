name: "🔧 Build Debug boot.img (Rescue Kernel)"

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag untuk output boot.img"
        required: true
        default: "v1rescue-debug"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ANDROID_VERSION: android15
  KERNEL_VERSION: "6.6"
  KSU_VERSION: ""
  RESCUE_NAME: ""
  BUILD_DATE: ""
  BUILD_TIME: ""

jobs:
  build-rescue:
    name: "🔧 Build Rescue boot.img (KSU-Next + PStore)"
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize Build Info
        run: |
          BUILD_DATE=$(TZ='Asia/Jakarta' date '+%d%m%Y')
          BUILD_TIME=$(TZ='Asia/Jakarta' date '+%Y-%m-%d %H:%M WIB')
          RESCUE_NAME="Epitaph-Rescue-Bazel-kernelsu-next-${BUILD_DATE}"
          echo "BUILD_DATE=${BUILD_DATE}" >> $GITHUB_ENV
          echo "BUILD_TIME=${BUILD_TIME}" >> $GITHUB_ENV
          echo "RESCUE_NAME=${RESCUE_NAME}" >> $GITHUB_ENV

      - name: Notify Telegram (Build Starting)
        continue-on-error: true
        env:
          TG_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          [ -z "$TG_BOT_TOKEN" ] || [ -z "$TG_CHAT_ID" ] && exit 0
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MSG=$(printf '<b>🚀 Epitaph Rescue Kernel — Build Starting</b>\n\n<b>Type:</b> Debug boot.img (Rescue)\n<b>Developer:</b> Naidrahiqa\n<b>Release Tag:</b> %s\n<b>Toolchain:</b> Bazel (AOSP Clang)\n<b>Root:</b> KernelSU-Next\n<b>PStore:</b> ✅ Aktif\n<b>Triggered by:</b> %s\n<b>Build Date:</b> %s\n\n<a href="%s">🔍 Monitor Build Progress</a>' \
            "${{ inputs.release_tag }}" "${{ github.actor }}" "${{ env.BUILD_TIME }}" "$RUN_URL")
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            --form-string "chat_id=${TG_CHAT_ID}" --form-string "text=${MSG}" --form-string "parse_mode=HTML"

      - name: Prepare Kernel Build (Common)
        run: |
          chmod +x "$GITHUB_WORKSPACE/scripts/prepare_kernel_build.sh"
          "$GITHUB_WORKSPACE/scripts/prepare_kernel_build.sh" \
            "rescue" \
            "${{ env.ANDROID_VERSION }}" \
            "${{ env.KERNEL_VERSION }}" \
            "${{ github.workspace }}" \
            "${{ env.GITHUB_ENV }}" \
            "bazel-default" \
            "kernelsu-next" \
            "false"

      - name: Restore Bazel Cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: gki-rescue-bazel-${{ hashFiles('patches/**', '.github/workflows/build_debug_bootimg.yml') }}
          restore-keys: |
            gki-rescue-bazel-
            gki-bazel-

      - name: Configure Kernel (Minimal Rescue)
        run: |
          set -euo pipefail
          cd kernel/common
          DEFCONFIG="arch/arm64/configs/gki_defconfig"
          add_cfg() { sed -i "/^${1%%=*}=.*/d" "$DEFCONFIG"; echo "$1" >> "$DEFCONFIG"; }

          echo "" >> "$DEFCONFIG"; echo "# KernelSU" >> "$DEFCONFIG"
          for c in CONFIG_KSU CONFIG_KPROBES CONFIG_HAVE_KPROBES CONFIG_KPROBE_EVENTS CONFIG_EXT4_FS; do add_cfg "${c}=y"; done

          echo "" >> "$DEFCONFIG"; echo "# Module Compat" >> "$DEFCONFIG"
          add_cfg "CONFIG_MODULE_SIG_FORCE=n"; add_cfg "CONFIG_MODULE_SIG_ALL=n"
          add_cfg "CONFIG_MODULE_SIG_PROTECT=n"; add_cfg "CONFIG_MODVERSIONS=y"

          echo "" >> "$DEFCONFIG"; echo "# Governor" >> "$DEFCONFIG"
          add_cfg "CONFIG_CPU_FREQ_GOV_SCHEDUTIL=y"
          sed -i '/^CONFIG_CPU_FREQ_DEFAULT_GOV_/d' "$DEFCONFIG"
          add_cfg "CONFIG_CPU_FREQ_DEFAULT_GOV_SCHEDUTIL=y"

          echo "" >> "$DEFCONFIG"; echo "# ZRAM" >> "$DEFCONFIG"
          add_cfg "CONFIG_ZSMALLOC=m"; add_cfg "CONFIG_ZRAM=m"

          echo "" >> "$DEFCONFIG"; echo "# WiFi" >> "$DEFCONFIG"
          add_cfg "CONFIG_CFG80211=m"; add_cfg "CONFIG_NL80211_TESTMODE=y"
          add_cfg "CONFIG_CFG80211_WEXT=y"; add_cfg "CONFIG_MAC80211=m"

          echo "" >> "$DEFCONFIG"; echo "# Netfilter" >> "$DEFCONFIG"
          for c in CONFIG_NETFILTER CONFIG_NF_CONNTRACK CONFIG_NF_NAT CONFIG_NF_NAT_MASQUERADE \
            CONFIG_IP_NF_IPTABLES CONFIG_IP_NF_NAT CONFIG_IP_NF_TARGET_MASQUERADE; do add_cfg "${c}=y"; done

          sed -i '/CONFIG_LOCALVERSION/d' "$DEFCONFIG"
          echo "" >> "$DEFCONFIG"; echo "# Branding" >> "$DEFCONFIG"
          echo 'CONFIG_LOCALVERSION="-Epitaph-Rescue"' >> "$DEFCONFIG"
          echo "CONFIG_LOCALVERSION_AUTO=n" >> "$DEFCONFIG"

          echo "" >> "$DEFCONFIG"; echo "# PStore / RAMoops (CRITICAL)" >> "$DEFCONFIG"
          add_cfg "CONFIG_PSTORE=y"; add_cfg "CONFIG_PSTORE_CONSOLE=y"
          add_cfg "CONFIG_PSTORE_PMSG=y"; add_cfg "CONFIG_PSTORE_RAM=y"
          add_cfg "CONFIG_PSTORE_RAM_MEM_ADDR=0x4d010000"; add_cfg "CONFIG_PSTORE_RAM_SIZE=0xe0000"
          add_cfg "CONFIG_PSTORE_RAM_CONSOLE_SIZE=0x40000"; add_cfg "CONFIG_PSTORE_RAM_PMSG_SIZE=0x80000"

          git add arch/arm64/configs/gki_defconfig

      - name: Build Kernel (Bazel)
        run: |
          set -euo pipefail
          cd kernel && mkdir -p $GITHUB_WORKSPACE/dist
          BUILD_OK=false
          for attempt in 1 2 3; do
            echo "Bazel build attempt $attempt/3..."
            # Jalankan build target kernel_aarch64 (utama) terlebih dahulu
            # Jika kompilasi utama berhasil, dist target boleh gagal saat meng-copy modul yang di-disable.
            if tools/bazel build --disk_cache=/home/runner/.cache/bazel --lto=none \
              --local_resources=memory=6144 --jobs=2 --noshow_progress --noshow_loading_progress \
              //common:kernel_aarch64 2>&1 | tee build.log; then
              
              # Coba jalankan target dist (tidak apa-apa jika exit code non-zero, karena modul.ko minim)
              tools/bazel run --disk_cache=/home/runner/.cache/bazel --lto=none \
                --local_resources=memory=6144 --jobs=2 --noshow_progress --noshow_loading_progress \
                //common:kernel_aarch64_dist -- --dist_dir=$GITHUB_WORKSPACE/dist || true
                
              BUILD_OK=true; break
            fi
            sleep 30
          done
          if [ "$BUILD_OK" != "true" ]; then
            echo "❌ Bazel build gagal"
            exit 1
          fi
        env:
          SOURCE_DATE_EPOCH: "0"

      - name: Extract Build Output
        run: |
          mkdir -p $GITHUB_WORKSPACE/dist
          cd kernel
          echo "=== Mencari Kernel Image hasil kompilasi ==="
          find bazel-bin/ -type f -name "Image*" -o -name "Image.gz*"
          
          # Salin dari lokasi Kleaf standard jika ada
          for a in Image Image.gz Image.lz4; do
            # Cari rekursif di bazel-bin jika path default kosong
            FOUND_IMG=$(find bazel-bin/ -type f -name "$a" | head -n 1)
            if [ -n "$FOUND_IMG" ]; then
              cp -v "$FOUND_IMG" "$GITHUB_WORKSPACE/dist/$a"
            fi
          done
          
          echo "=== Isi folder dist/ ==="
          ls -lah $GITHUB_WORKSPACE/dist/

      - name: Verify Build
        run: |
          HAS_IMAGE=false
          for f in dist/Image dist/Image.gz dist/Image.lz4; do
            [ -f "$f" ] && HAS_IMAGE=true
          done
          if [ "$HAS_IMAGE" = "false" ]; then
            echo "❌ No kernel image found!"
            exit 1
          fi

      - name: Download Stock boot.img
        run: |
          curl -sL -o stock_boot.img \
            "https://github.com/${{ github.repository }}/releases/download/v1kernel-helper-debugging/boot.img"
          echo "✅ Stock boot.img downloaded ($(du -h stock_boot.img | cut -f1))"

      - name: Download magiskboot
        run: |
          MAGISK_URL=$(curl -sL https://api.github.com/repos/topjohnwu/Magisk/releases/latest \
            | jq -r '.assets[] | select(.name | contains("Magisk-v")) | .browser_download_url' | head -n1)
          if [ -n "$MAGISK_URL" ]; then
            curl -sL -o magisk.apk "$MAGISK_URL"
            unzip -o magisk.apk lib/x86_64/libmagiskboot.so -d magisk_extract
            cp magisk_extract/lib/x86_64/libmagiskboot.so ./magiskboot
          else
            curl -sL -o magiskboot "https://github.com/nicholaschum/magiskboot_build/releases/latest/download/magiskboot-x86_64"
          fi
          chmod +x ./magiskboot

      - name: Repack boot.img with Custom Kernel
        run: |
          set -euo pipefail
          mkdir -p repack && cd repack
          cp ../stock_boot.img boot.img
          ../magiskboot unpack boot.img
          SELECTED=""
          for img in "$GITHUB_WORKSPACE/dist/Image.gz" "$GITHUB_WORKSPACE/dist/Image.lz4" "$GITHUB_WORKSPACE/dist/Image"; do
            [ -f "$img" ] && SELECTED="$img" && break
          done
          if [ -z "$SELECTED" ]; then
            echo "❌ No kernel image!"
            exit 1
          fi
          cp "$SELECTED" kernel
          ../magiskboot repack boot.img new_boot.img
          cp new_boot.img "$GITHUB_WORKSPACE/dist/${RESCUE_NAME}-boot.img"
          echo "✅ Rescue boot.img created: ${RESCUE_NAME}-boot.img ($(du -h new_boot.img | cut -f1))"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: "${{ env.RESCUE_NAME }}"
          path: dist/${{ env.RESCUE_NAME }}-boot.img
          if-no-files-found: error
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ inputs.release_tag }}"
          name: "🔧 Epitaph Rescue Kernel ${{ inputs.release_tag }}"
          body: |
            ### 🔧 Epitaph Rescue Kernel (Debug boot.img)

            **Tujuan:** Boot image cadangan untuk menarik log crash via Fastboot.

            - **Type:** GKI 6.6 (Minimal — No SUSFS)
            - **Root:** KernelSU-Next v${{ env.KSU_VERSION }}
            - **Toolchain:** Bazel (AOSP Clang)
            - **Branding:** `-Epitaph-Rescue`
            - **PStore:** ✅ Aktif (`0x4d010000`)
            - **Built:** ${{ env.BUILD_TIME }} (run #${{ github.run_number }})

            #### 🛠️ Cara Pakai:
            ```bash
            fastboot flash boot ${{ env.RESCUE_NAME }}-boot.img
            fastboot reboot
            # Setelah masuk Android:
            adb pull /sys/fs/pstore/console-ramoops-0 last_kmsg.log
            ```
          files: dist/${{ env.RESCUE_NAME }}-boot.img
          draft: false
          prerelease: true

      - name: Send boot.img to Telegram (Update Channel)
        if: success()
        continue-on-error: true
        env:
          TG_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          [ -z "$TG_BOT_TOKEN" ] || [ -z "$TG_CHAT_ID" ] && exit 0
          BOOT_FILE="dist/${RESCUE_NAME}-boot.img"
          [ ! -f "$BOOT_FILE" ] && exit 0
          
          BOOT_SIZE=$(du -h "$BOOT_FILE" | cut -f1)
          BOOT_BYTES=$(du -b "$BOOT_FILE" | cut -f1)
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/${{ inputs.release_tag }}"
          TG_API="https://api.telegram.org/bot${TG_BOT_TOKEN}"
          CAPTION=$(printf '<b>👑 Epitaph Rescue Kernel — Build Done</b>\n\n<b>Kernel:</b> %s\n<b>Version:</b> v%s\n<b>Developer:</b> Naidrahiqa\n<b>Type:</b> GKI 6.6 (Rescue / Debug)\n<b>Root:</b> KernelSU-Next v%s\n<b>Governor:</b> schedutil\n<b>Toolchain:</b> Bazel (AOSP Clang)\n<b>KMI:</b> %s\n<b>PStore:</b> ✅ Aktif (0x4d010000)\n<b>Size:</b> %s\n<b>Built:</b> %s\n<b>Run:</b> #%s\n\n<b>🔧 Purpose:</b> Flash via Fastboot untuk menarik crash log dari kernel yang bootloop\n\n<a href="%s">📦 GitHub Release</a>' \
            "${RESCUE_NAME}" "${{ github.run_number }}" "${{ env.KSU_VERSION }}" "${{ env.KMI_GENERATION }}" \
            "$BOOT_SIZE" "${{ env.BUILD_TIME }}" "${{ github.run_number }}" "$RELEASE_URL")
          TG_LIMIT=52428800
          if [ "$BOOT_BYTES" -le "$TG_LIMIT" ]; then
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${TG_API}/sendDocument" \
              --form-string "chat_id=${TG_CHAT_ID}" \
              -F "document=@${BOOT_FILE};filename=${RESCUE_NAME}-boot.img" \
              --form-string "caption=${CAPTION}" --form-string "parse_mode=HTML" || echo "000")
            [ "$HTTP" != "200" ] && curl -s -X POST "${TG_API}/sendMessage" \
              --form-string "chat_id=${TG_CHAT_ID}" --form-string "text=${CAPTION}" --form-string "parse_mode=HTML"
          else
            curl -s -X POST "${TG_API}/sendMessage" \
              --form-string "chat_id=${TG_CHAT_ID}" --form-string "text=${CAPTION}" --form-string "parse_mode=HTML"
          fi

      - name: Send Error Log to Telegram (Error Dump Channel)
        if: failure()
        continue-on-error: true
        env:
          TG_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_ERROR_CHAT_ID: ${{ secrets.TELEGRAM_ERROR_CHAT_ID }}
        run: |
          [ -z "$TG_BOT_TOKEN" ] || [ -z "$TG_ERROR_CHAT_ID" ] && exit 0
          TG_API="https://api.telegram.org/bot${TG_BOT_TOKEN}"
          ACTIONS_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
          ERROR_LOG="/tmp/epitaph_error.log"
          : > "$ERROR_LOG"
          for log in "kernel/build.log" "kernel/common/build.log"; do
            if [ -f "$log" ]; then
              echo "=== $(basename $log) ===" >> "$ERROR_LOG"
              grep -iE "error:|fatal:|undefined reference|cannot find|failed|❌" "$log" | tail -60 >> "$ERROR_LOG" 2>/dev/null || true
              echo "--- last 80 lines ---" >> "$ERROR_LOG"
              tail -80 "$log" >> "$ERROR_LOG" 2>/dev/null || true
            fi
          done
          [ ! -s "$ERROR_LOG" ] && printf "No build.log found.\nCheck: %s\n" "$ACTIONS_URL" > "$ERROR_LOG"

          HEADER=$(printf '<b>❌ Epitaph Rescue Kernel — Build FAILED</b>\n\n<b>Kernel:</b> %s\n<b>Version:</b> v%s\n<b>Developer:</b> Naidrahiqa\n<b>Toolchain:</b> Bazel (AOSP Clang)\n<b>Root:</b> KernelSU-Next\n<b>Built:</b> %s\n<b>Triggered by:</b> %s\n\n<a href="%s">🔍 Full log di GitHub Actions</a>' \
            "${RESCUE_NAME}" "${{ github.run_number }}" "${{ env.BUILD_TIME }}" "${{ github.actor }}" "$ACTIONS_URL")
          curl -s -X POST "${TG_API}/sendMessage" \
            --form-string "chat_id=${TG_ERROR_CHAT_ID}" --form-string "text=${HEADER}" --form-string "parse_mode=HTML"

          LOG_FILENAME="${RESCUE_NAME}-Error.log"
          cp "$ERROR_LOG" "/tmp/${LOG_FILENAME}"
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${TG_API}/sendDocument" \
            --form-string "chat_id=${TG_ERROR_CHAT_ID}" \
            -F "document=@/tmp/${LOG_FILENAME};filename=${LOG_FILENAME}" \
            --form-string "caption=📋 Error log — ${RESCUE_NAME}" --form-string "parse_mode=HTML" || echo "000")
          if [ "$HTTP" != "200" ]; then
            SNIPPET=$(tail -30 "$ERROR_LOG" | head -c 3500)
            curl -s -X POST "${TG_API}/sendMessage" \
              --form-string "chat_id=${TG_ERROR_CHAT_ID}" \
              --form-string "text=$(printf '<b>📋 Error snippet:</b>\n<pre>%s</pre>' "$SNIPPET")" \
              --form-string "parse_mode=HTML"
          fi

      - name: Upload Debug Artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: "Debug-${{ env.RESCUE_NAME }}"
          path: |
            kernel/build.log
            kernel/common/build.log
            kernel/common/arch/arm64/configs/gki_defconfig
          if-no-files-found: warn
          retention-days: 7
